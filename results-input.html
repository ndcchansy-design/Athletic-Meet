<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成績輸入系統 - 獻主會聖母院書院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; }
        .empty-lane { background-color: #f1f5f9; color: #94a3b8; }
        .active-lane { background-color: #ffffff; }
        input:disabled, select:disabled { background-color: #f1f5f9; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- 頂部導覽列 -->
    <nav class="bg-red-800 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-xl font-bold flex items-center">
                <i class="fas fa-stopwatch mr-2"></i>
                <span>成績輸入系統</span>
            </div>
            <div id="status-indicator" class="text-sm font-bold px-3 py-1 rounded bg-red-900">
                <i class="fas fa-circle-notch fa-spin mr-1"></i> 連線中...
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- 控制面板 -->
        <div class="bg-white p-5 rounded-lg shadow-md border-t-4 border-red-800 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">選擇比賽項目</label>
                    <select id="event-select" class="w-full border border-gray-300 rounded px-3 py-2 bg-gray-50 focus:ring-2 focus:ring-red-500">
                        <option value="">載入資料中...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">選擇組別</label>
                    <select id="heat-select" class="w-full border border-gray-300 rounded px-3 py-2 bg-gray-50 focus:ring-2 focus:ring-red-500">
                        <option value="">請先選擇項目</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="saveResults()" id="save-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow transition flex items-center justify-center disabled:opacity-50">
                        <i class="fas fa-save mr-2"></i> 儲存本組成績
                    </button>
                </div>
            </div>
        </div>

        <!-- 成績輸入表格 -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h2 id="table-title" class="text-xl font-bold text-gray-800">請選擇比賽項目與組別</h2>
                <span class="text-sm text-red-600 font-bold">大會紀錄：讀取中...</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-sm border-b-2 border-gray-200">
                            <th class="py-3 px-4 w-16 text-center">線道</th>
                            <th class="py-3 px-4 w-24">號碼布</th>
                            <th class="py-3 px-4 w-32">姓名</th>
                            <th class="py-3 px-4 w-24">班別</th>
                            <th class="py-3 px-4 w-32">狀態</th>
                            <th class="py-3 px-4 w-48">成績 (自動格式化)</th>
                            <th class="py-3 px-4 w-24">名次</th>
                            <th class="py-3 px-4">備註</th>
                        </tr>
                    </thead>
                    <tbody id="input-tbody">
                        <!-- JS 動態生成內容 -->
                        <tr><td colspan="8" class="text-center py-10 text-gray-400">請在上方選擇項目以載入名單</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6N110dVd8_T9tygXEApjTPsQC5HsF0IQ",
            authDomain: "athletic-meet-85936.firebaseapp.com",
            projectId: "athletic-meet-85936"
        };

        let app, db;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            window.db = db;
            window.getDocs = getDocs;
            window.collection = collection;
            window.doc = doc;
            window.setDoc = setDoc;
            window.getDoc = getDoc;
            
            document.getElementById('status-indicator').innerHTML = '<i class="fas fa-check-circle mr-1"></i> 已連線';
            document.getElementById('status-indicator').className = 'text-sm font-bold px-3 py-1 rounded bg-green-600';
            
            fetchAllData(); 
        } catch (error) {
            console.error("Firebase 初始化失敗：", error);
            document.getElementById('status-indicator').innerHTML = '<i class="fas fa-times-circle mr-1"></i> 連線失敗';
        }
    </script>

    <script>
        let globalStudentsData = [];
        let eventMap = new Map();
        let currentHeatsData = []; 
        let currentEventKey = "";

        // 字串正規化 (與文件生成系統一致)
        const normalizeString = (str) => {
            if (!str) return '';
            return str.replace(/\s+/g, '').toUpperCase().replace('擲壘球', '壘球').replace('擲標槍', '標槍').replace('擲鐵餅', '鐵餅').replace('推鉛球', '鉛球').replace('推銘球', '鉛球');
        };

        async function fetchAllData() {
            try {
                const studentSnap = await window.getDocs(window.collection(window.db, "students"));
                globalStudentsData = [];
                eventMap.clear();

                studentSnap.forEach((doc) => {
                    const student = doc.data();
                    globalStudentsData.push(student);
                    if (student.registeredEvents) {
                        student.registeredEvents.forEach(ev => {
                            const normalizedEv = normalizeString(ev);
                            if (!eventMap.has(normalizedEv)) eventMap.set(normalizedEv, []);
                            eventMap.get(normalizedEv).push(student);
                        });
                    }
                });
                populateEventDropdown();
            } catch (error) {
                console.error("讀取資料失敗:", error);
            }
        }

        function populateEventDropdown() {
            const select = document.getElementById('event-select');
            select.innerHTML = '<option value="">-- 請選擇比賽項目 --</option>';
            const sortedEvents = Array.from(eventMap.keys()).sort();
            
            sortedEvents.forEach(ev => {
                // 排除田賽，因為此介面主要是徑賽格式
                if(!ev.includes('跳') && !ev.includes('擲') && !ev.includes('推') && !ev.includes('鐵餅') && !ev.includes('鉛球') && !ev.includes('標槍') && !ev.includes('壘球')) {
                    select.innerHTML += `<option value="${ev}">${ev}</option>`;
                }
            });

            select.addEventListener('change', function() {
                currentEventKey = this.value;
                generateHeats(currentEventKey);
            });
        }

        function generateHeats(eventKey) {
            const heatSelect = document.getElementById('heat-select');
            if (!eventKey) {
                heatSelect.innerHTML = '<option value="">請先選擇項目</option>';
                return;
            }

            let rawStudents = eventMap.get(eventKey) || [];
            // 依號碼布排序 (與文件生成系統完全一致)
            let students = [...rawStudents].sort((a, b) => (a.bibNumber || '').localeCompare(b.bibNumber || ''));
            
            currentHeatsData = [];
            
            if (students.length > 0) {
                const numHeats = Math.ceil(students.length / 8); 
                const baseSize = Math.floor(students.length / numHeats); 
                let remainder = students.length % numHeats; 

                let studentIndex = 0;
                for (let i = 0; i < numHeats; i++) {
                    let heatSize = baseSize + (remainder > 0 ? 1 : 0);
                    remainder--;
                    let heatStudents = students.slice(studentIndex, studentIndex + heatSize);
                    studentIndex += heatSize;

                    const laneOrder = [3, 4, 5, 6, 2, 7, 1, 8];
                    let assignedLanes = laneOrder.slice(0, heatSize).sort((a, b) => a - b);

                    let heatData = [];
                    for (let lane = 1; lane <= 8; lane++) {
                        heatData.push({ assignedLane: lane, isEmpty: true });
                    }

                    heatStudents.forEach((stu, idx) => {
                        const laneToAssign = assignedLanes[idx];
                        const laneIndex = heatData.findIndex(d => d.assignedLane === laneToAssign);
                        if (laneIndex !== -1) {
                            heatData[laneIndex] = { ...stu, assignedLane: laneToAssign, isEmpty: false };
                        }
                    });
                    currentHeatsData.push(heatData);
                }
            }

            heatSelect.innerHTML = '<option value="">-- 請選擇組別 --</option>';
            currentHeatsData.forEach((_, index) => {
                heatSelect.innerHTML += `<option value="${index}">第 ${index + 1} 組</option>`;
            });

            heatSelect.onchange = () => renderTable(parseInt(heatSelect.value));
        }

        // ==========================================
        // 問題 4 修復：載入已儲存的成績
        // ==========================================
        async function renderTable(heatIndex) {
            const tbody = document.getElementById('input-tbody');
            if (isNaN(heatIndex)) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-10 text-gray-400">請選擇組別</td></tr>';
                return;
            }

            document.getElementById('table-title').innerText = `${currentEventKey} - 第 ${heatIndex + 1} 組`;
            const heatData = currentHeatsData[heatIndex];
            
            // 預設表格 (空資料)
            let html = '';
            heatData.forEach((stu) => {
                if (stu.isEmpty) {
                    html += `
                        <tr class="border-b border-gray-200 empty-lane">
                            <td class="py-2 px-4 text-center font-bold text-xl">${stu.assignedLane}</td>
                            <td colspan="7" class="py-2 px-4 text-center">-- 空線道 --</td>
                        </tr>
                    `;
                } else {
                    const name = stu.nameZh || stu.nameEn || '';
                    const cls = stu.classCode ? `${stu.classCode}(${stu.classNo})` : '';
                    const rowId = `row-${stu.assignedLane}`;
                    
                    html += `
                        <tr id="${rowId}" class="border-b border-gray-200 active-lane hover:bg-blue-50 transition" data-bib="${stu.bibNumber}">
                            <td class="py-3 px-4 text-center font-bold text-xl">${stu.assignedLane}</td>
                            <td class="py-3 px-4 font-bold text-lg">${stu.bibNumber}</td>
                            <td class="py-3 px-4 font-bold">${name}</td>
                            <td class="py-3 px-4">${cls}</td>
                            <td class="py-3 px-4">
                                <select class="status-select border border-gray-300 rounded px-2 py-1 w-full" onchange="handleStatusChange(this, ${stu.assignedLane})">
                                    <option value="正常">正常</option>
                                    <option value="DNS">DNS (缺席)</option>
                                    <option value="DNF">DNF (未完成)</option>
                                    <option value="DQ">DQ (取消資格)</option>
                                </select>
                            </td>
                            <td class="py-3 px-4">
                                <input type="text" class="result-input border border-gray-300 rounded px-3 py-1 w-full font-mono text-lg tracking-wider" placeholder="例：021651" oninput="formatTimeInput(this)">
                            </td>
                            <td class="py-3 px-4">
                                <input type="number" class="rank-input border border-gray-300 rounded px-3 py-1 w-full text-center font-bold" min="1" max="8">
                            </td>
                            <td class="py-3 px-4">
                                <input type="text" class="remark-input border border-gray-300 rounded px-3 py-1 w-full text-sm" placeholder="備註...">
                            </td>
                        </tr>
                    `;
                }
            });
            tbody.innerHTML = html;

            // 嘗試從 Firebase 讀取已儲存的資料填入
            try {
                const docId = `${currentEventKey}_heat${heatIndex}`;
                const docSnap = await window.getDoc(window.doc(window.db, "results", docId));
                
                if (docSnap.exists()) {
                    const savedData = docSnap.data().records;
                    savedData.forEach(record => {
                        // 找尋對應號碼布的行
                        const row = document.querySelector(`tr[data-bib="${record.bib}"]`);
                        if (row) {
                            row.querySelector('.status-select').value = record.status || '正常';
                            row.querySelector('.result-input').value = record.resultStr || '';
                            row.querySelector('.rank-input').value = record.rank || '';
                            row.querySelector('.remark-input').value = record.remark || '';
                            // 觸發狀態改變以鎖定/解鎖欄位
                            handleStatusChange(row.querySelector('.status-select'), record.lane);
                        }
                    });
                }
            } catch (e) {
                console.warn("讀取歷史成績失敗", e);
            }
        }

        function handleStatusChange(selectElem, lane) {
            const row = document.getElementById(`row-${lane}`);
            const resultInput = row.querySelector('.result-input');
            const rankInput = row.querySelector('.rank-input');
            
            if (selectElem.value !== '正常') {
                resultInput.value = '';
                rankInput.value = '';
                resultInput.disabled = true;
                rankInput.disabled = true;
                row.classList.add('bg-gray-100');
            } else {
                resultInput.disabled = false;
                rankInput.disabled = false;
                row.classList.remove('bg-gray-100');
            }
        }

        // 自動格式化時間輸入 (例如輸入 013245 -> 01m 32.45s)
        function formatTimeInput(input) {
            let val = input.value.replace(/\D/g, ''); // 移除非數字
            
            if (val.length === 0) {
                input.value = '';
                return;
            }
            
            // 限制最多 6 位數
            if (val.length > 6) val = val.substring(0, 6);
            
            // 補零邏輯
            let formatted = '';
            if (val.length <= 2) {
                formatted = val + 's';
            } else if (val.length <= 4) {
                formatted = val.slice(0, -2) + '.' + val.slice(-2) + 's';
            } else {
                formatted = val.slice(0, -4) + 'm ' + val.slice(-4, -2) + '.' + val.slice(-2) + 's';
            }
            
            input.value = formatted;
        }

        // ==========================================
        // 核心修復：儲存前的嚴格驗證邏輯
        // ==========================================
        async function saveResults() {
            const heatIndex = document.getElementById('heat-select').value;
            if (heatIndex === "") return alert("請先選擇組別！");

            const rows = document.querySelectorAll('.active-lane');
            let recordsToSave = [];
            let timeRankPairs = [];
            let allRanks = [];

            for (let row of rows) {
                const lane = row.querySelector('td:first-child').innerText;
                const bib = row.getAttribute('data-bib');
                const status = row.querySelector('.status-select').value;
                const resultStr = row.querySelector('.result-input').value;
                const rank = row.querySelector('.rank-input').value;
                const remark = row.querySelector('.remark-input').value;

                if (status === '正常' && resultStr) {
                    // 問題 1 修復：驗證 88 秒不應存在
                    const timeMatch = resultStr.match(/(?:(\d+)m\s*)?(\d+)\.(\d+)s/);
                    if (timeMatch) {
                        const m = parseInt(timeMatch[1] || 0);
                        const s = parseInt(timeMatch[2]);
                        const ms = parseInt(timeMatch[3]);

                        if (s >= 60) {
                            alert(`❌ 錯誤：號碼布 ${bib} 的成績 (${resultStr}) 格式不正確！\n「秒數」不能大於或等於 60。`);
                            return; // 阻擋儲存
                        }

                        // 計算總毫秒數，用於後續名次比對
                        const totalMs = (m * 60 * 1000) + (s * 1000) + (ms * 10);
                        
                        if (rank) {
                            allRanks.push(parseInt(rank));
                            timeRankPairs.push({ bib, time: totalMs, rank: parseInt(rank), resultStr });
                        }
                    }
                }

                recordsToSave.push({ lane, bib, status, resultStr, rank, remark });
            }

            // 問題 2 修復：檢查重複名次
            const uniqueRanks = new Set(allRanks);
            if (allRanks.length !== uniqueRanks.size) {
                const confirmSave = confirm("⚠️ 警告：偵測到「重複的名次」！\n田徑賽中除非成績完全相同至千分之一秒，否則極少有並列名次。\n\n您確定要強制儲存嗎？");
                if (!confirmSave) return; // 使用者按取消則阻擋儲存
            }

            // 問題 3 修復：檢查名次與時間是否衝突
            // 將成績由快到慢排序 (時間越短越好)
            timeRankPairs.sort((a, b) => a.time - b.time);
            
            for (let i = 0; i < timeRankPairs.length - 1; i++) {
                const current = timeRankPairs[i];
                const next = timeRankPairs[i+1];
                
                // 如果 current 跑得比 next 快 (時間較短)，但 current 的名次數字卻 >= next 的名次數字 (例如 12秒拿第2名，13秒拿第1名)
                if (current.time < next.time && current.rank >= next.rank) {
                    alert(`❌ 錯誤：成績與名次發生衝突！\n\n號碼布 ${current.bib} (${current.resultStr}) 跑得比 號碼布 ${next.bib} (${next.resultStr}) 快，但名次卻沒有排在前面！\n\n請修正後再儲存。`);
                    return; // 阻擋儲存
                }
            }

            // 通過所有驗證，執行儲存寫入 Firebase
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 儲存中...';
            btn.disabled = true;

            try {
                const docId = `${currentEventKey}_heat${heatIndex}`;
                await window.setDoc(window.doc(window.db, "results", docId), {
                    event: currentEventKey,
                    heat: parseInt(heatIndex),
                    updatedAt: new Date().toISOString(),
                    records: recordsToSave
                });
                
                alert("✅ 成績儲存成功！");
            } catch (error) {
                console.error("儲存失敗:", error);
                alert("❌ 儲存失敗，請檢查網路連線。");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
