<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獻主會聖母院書院 - 司令台成績輸入系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        .input-focus:focus { outline: 2px solid #3b82f6; background-color: #eff6ff; }
        .status-abs { background-color: #fee2e2; color: #991b1b; }
        .status-dnf { background-color: #fef3c7; color: #92400e; }
        .status-dq { background-color: #f3f4f6; color: #374151; }
        .empty-lane { background-color: #f9fafb; color: #9ca3af; }
    </style>
</head>
<body>

    <nav class="bg-green-800 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-xl font-bold flex items-center">
                <i class="fas fa-stopwatch mr-2"></i>
                <span>獻主會聖母院書院 - 司令台成績輸入系統</span>
            </div>
            <div class="text-sm font-medium" id="school-year-display">讀取中...</div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-green-800 mb-6">
            <h2 class="text-lg font-bold mb-4 text-gray-800"><i class="fas fa-filter mr-2"></i>選擇比賽項目</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">比賽項目</label>
                    <select id="event-select" onchange="updateHeatDropdown()" class="w-full border border-gray-300 rounded px-3 py-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
                        <option value="">載入資料中...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">組別 / 階段</label>
                    <select id="heat-select" class="w-full border border-gray-300 rounded px-3 py-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
                        <option value="">-- 請先選擇項目 --</option>
                    </select>
                </div>
                <div>
                    <button onclick="loadInputTable()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow transition flex items-center justify-center">
                        <i class="fas fa-search mr-2"></i> 載入名單
                    </button>
                </div>
            </div>
        </div>

        <div id="input-section" class="bg-white rounded-lg shadow-md overflow-hidden hidden">
            <div class="bg-gray-100 px-6 py-4 border-b flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800" id="current-event-title">項目名稱</h3>
                <div class="text-sm text-red-600 font-bold" id="record-display">大會紀錄：讀取中...</div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-700 text-sm border-b-2 border-gray-300">
                            <th class="px-4 py-3 text-center w-16" id="col-lane-title">線道</th>
                            <th class="px-4 py-3 w-20">號碼布</th>
                            <th class="px-4 py-3 w-40">姓名</th>
                            <th class="px-4 py-3 w-24">班別</th>
                            <th class="px-4 py-3 w-32 text-center">狀態</th>
                            <th class="px-4 py-3 w-48 text-center">成績 (自動格式化)</th>
                            <th class="px-4 py-3 w-24 text-center">名次</th>
                            <th class="px-4 py-3">備註</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body" class="text-sm">
                        <!-- 動態生成列 -->
                    </tbody>
                </table>
            </div>

            <div class="bg-gray-50 px-6 py-4 border-t flex justify-between items-center">
                <div>
                    <button onclick="generateFinalists()" id="btn-generate-final" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded shadow transition hidden">
                        <i class="fas fa-list-ol mr-2"></i> 結算初賽並產生決賽名單
                    </button>
                </div>
                <div class="flex gap-3">
                    <button onclick="verifyAndSave()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow transition text-lg">
                        <i class="fas fa-save mr-2"></i> 核對名次並儲存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6N110dVd8_T9tygXEApjTPsQC5HsF0IQ",
            authDomain: "athletic-meet-85936.firebaseapp.com",
            projectId: "athletic-meet-85936"
        };

        let app, db;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            window.db = db;
            window.getDocs = getDocs;
            window.collection = collection;
            fetchAllData(); 
        } catch (error) {
            console.error("Firebase 初始化失敗：", error);
        }
    </script>

    <script>
        let globalStudentsData = [];
        let eventMap = new Map();
        let scheduleData = [];
        let currentIsFieldEvent = false;
        let currentGeneratedHeats = []; // 儲存與文件系統相同的編排結果

        const normalizeString = (str) => {
            if (!str) return '';
            let s = str.replace(/\s+/g, '').toUpperCase();
            s = s.replace('擲壘球', '壘球').replace('擲標槍', '標槍').replace('擲鐵餅', '鐵餅').replace('推鉛球', '鉛球').replace('推銘球', '鉛球'); 
            return s;
        };

        function isFieldEvent(eventName) {
            const fieldKeywords = ['跳高', '跳遠', '鐵餅', '標槍', '鉛球', '壘球'];
            return fieldKeywords.some(keyword => eventName.includes(keyword));
        }

        function isLongDistance(eventName) {
            const upperEvent = eventName.toUpperCase();
            return upperEvent.includes('800M') || upperEvent.includes('1500M');
        }

        async function fetchAllData() {
            if (!window.db) return;
            try {
                const studentSnap = await window.getDocs(window.collection(window.db, "students"));
                globalStudentsData = [];
                eventMap.clear();
                let schoolYear = "2025-26"; 

                studentSnap.forEach((doc) => {
                    const student = doc.data();
                    globalStudentsData.push(student);
                    if (student.schoolYear) schoolYear = student.schoolYear;
                    
                    if (student.registeredEvents && Array.isArray(student.registeredEvents)) {
                        student.registeredEvents.forEach(ev => {
                            const normalizedEv = normalizeString(ev);
                            if (!eventMap.has(normalizedEv)) eventMap.set(normalizedEv, []);
                            eventMap.get(normalizedEv).push(student);
                        });
                    }
                });

                document.getElementById('school-year-display').innerText = `${schoolYear} 年度`;

                try {
                    const scheduleSnap = await window.getDocs(window.collection(window.db, "schedule"));
                    scheduleData = [];
                    scheduleSnap.forEach((doc) => {
                        scheduleData.push({ id: doc.id, ...doc.data() });
                    });
                } catch (e) {}

                populateDropdown();
            } catch (error) {
                console.error("讀取資料失敗:", error);
            }
        }

        function populateDropdown() {
            const select = document.getElementById('event-select');
            select.innerHTML = '<option value="">-- 請選擇比賽項目 --</option>';
            
            if (scheduleData && scheduleData.length > 0) {
                scheduleData.sort((a, b) => (parseInt(a['項目'] || a.itemNo || a.id) || 0) - (parseInt(b['項目'] || b.itemNo || b.id) || 0));
                scheduleData.forEach(item => {
                    const itemNo = item['項目'] || item.itemNo || item.id || '';
                    const group = item['女子組'] || item['男子組'] || item.girlsGroup || item.boysGroup || '';
                    const event = item['徑項'] || item['田項'] || item.trackEvent || item.fieldEvent || '';
                    const stage = (item['初賽'] || item.heats) ? '初賽' : '決賽';
                    const fullEventName = `${group} ${event}`.trim();
                    
                    if (fullEventName) {
                        const format1 = normalizeString(`${event}${group}`);
                        const format2 = normalizeString(`${group}${event}`);
                        let matchKey = eventMap.has(format2) ? format2 : format1;

                        select.innerHTML += `<option value="${fullEventName}" data-matchkey="${matchKey}" data-stage="${stage}">
                            【${itemNo || '未編號'}】 ${fullEventName} (${stage})
                        </option>`;
                    }
                });
            }
            window.updateHeatDropdown();
        }

        // 核心同步邏輯：產生與「文件生成系統」完全一致的分組與線道資料
        function generateUnifiedHeats(eventName, stage, matchKey) {
            let rawStudents = eventMap.get(matchKey) || [];
            
            // 1. 固定排序 (取代 Math.random，確保兩個系統結果一致)
            let students = [...rawStudents].sort((a, b) => {
                const bibA = a.bibNumber || '';
                const bibB = b.bibNumber || '';
                return bibA.localeCompare(bibB);
            });

            const isField = isFieldEvent(eventName);
            const isLongDist = isLongDistance(eventName);
            let heats = [];

            if (isField) {
                heats.push({ heatValue: 'final', heatName: '決賽', data: students.map((s, i) => ({...s, assignedLane: i+1, isEmpty: false})) });
            } else if (isLongDist) {
                if (stage === "決賽" && students.length === 0) {
                    let heatData = [];
                    for (let i = 1; i <= 15; i++) heatData.push({ assignedLane: i, isEmpty: true });
                    heats.push({ heatValue: 'final', heatName: '決賽', data: heatData });
                } else {
                    let numHeats = (students.length >= 17 && stage !== "決賽") ? Math.ceil(students.length / 15) : 1;
                    const baseSize = Math.floor(students.length / numHeats);
                    let remainder = students.length % numHeats;
                    let studentIndex = 0;
                    
                    for (let i = 0; i < numHeats; i++) {
                        let heatSize = baseSize + (remainder > 0 ? 1 : 0);
                        remainder--;
                        let heatStudents = students.slice(studentIndex, studentIndex + heatSize);
                        studentIndex += heatSize;
                        let heatData = heatStudents.map((stu, idx) => ({ ...stu, assignedLane: idx + 1, isEmpty: false }));
                        heats.push({
                            heatValue: numHeats > 1 ? String(i + 1) : 'final',
                            heatName: numHeats > 1 ? `初賽 - 第 ${i + 1} 組` : '決賽',
                            data: heatData
                        });
                    }
                }
            } else {
                let isDirectFinal = stage === "決賽" && students.length > 0 && students.length <= 8;
                if (students.length > 0 && (stage !== "決賽" || isDirectFinal)) {
                    const numHeats = Math.ceil(students.length / 8); 
                    const baseSize = Math.floor(students.length / numHeats); 
                    let remainder = students.length % numHeats; 
                    let studentIndex = 0;

                    for (let i = 0; i < numHeats; i++) {
                        let heatSize = baseSize + (remainder > 0 ? 1 : 0);
                        remainder--;
                        let heatStudents = students.slice(studentIndex, studentIndex + heatSize);
                        studentIndex += heatSize;

                        // 短跑優勢線道邏輯 (與文件系統完全一致)
                        const laneOrder = [3, 4, 5, 6, 2, 7, 1, 8];
                        let assignedLanes = laneOrder.slice(0, heatSize).sort((a, b) => a - b);
                        let heatData = [];
                        for (let lane = 1; lane <= 8; lane++) {
                            heatData.push({ assignedLane: lane, isEmpty: true });
                        }

                        heatStudents.forEach((stu, idx) => {
                            const laneToAssign = assignedLanes[idx];
                            const laneIndex = heatData.findIndex(d => d.assignedLane === laneToAssign);
                            if (laneIndex !== -1) {
                                heatData[laneIndex] = { ...stu, assignedLane: laneToAssign, isEmpty: false };
                            }
                        });

                        heats.push({
                            heatValue: numHeats > 1 ? String(i + 1) : 'final',
                            heatName: numHeats > 1 ? `初賽 - 第 ${i + 1} 組` : '決賽',
                            data: heatData
                        });
                    }
                } else if (stage === "決賽" && !isDirectFinal) {
                    let heatData = [];
                    for (let lane = 1; lane <= 8; lane++) {
                        heatData.push({ assignedLane: lane, isEmpty: true });
                    }
                    heats.push({ heatValue: 'final', heatName: '決賽 (待填)', data: heatData });
                }
            }
            return heats;
        }

        window.updateHeatDropdown = function() {
            const eventSelect = document.getElementById('event-select');
            const heatSelect = document.getElementById('heat-select');
            heatSelect.innerHTML = ''; 

            const selectedOption = eventSelect.options[eventSelect.selectedIndex];
            if (!selectedOption || !selectedOption.value) {
                heatSelect.innerHTML = '<option value="">-- 請先選擇項目 --</option>';
                return;
            }

            const eventName = selectedOption.value;
            const matchKey = selectedOption.getAttribute('data-matchkey');
            const stage = selectedOption.getAttribute('data-stage'); 

            // 呼叫統一編排邏輯
            currentGeneratedHeats = generateUnifiedHeats(eventName, stage, matchKey);

            if (currentGeneratedHeats.length === 0) {
                heatSelect.innerHTML = '<option value="">無報名資料</option>';
                return;
            }

            currentGeneratedHeats.forEach((heat, index) => {
                heatSelect.innerHTML += `<option value="${index}">${heat.heatName}</option>`;
            });
        };

        window.loadInputTable = function() {
            const select = document.getElementById('event-select');
            const option = select.options[select.selectedIndex];
            if (!option || !option.value) {
                alert("請先選擇比賽項目！");
                return;
            }

            const heatSelect = document.getElementById('heat-select');
            const heatIndex = heatSelect.value;
            if (heatIndex === "") return;

            const eventName = option.value;
            currentIsFieldEvent = isFieldEvent(eventName);
            const isLongDist = isLongDistance(eventName);
            
            const selectedHeat = currentGeneratedHeats[heatIndex];

            document.getElementById('current-event-title').innerText = `${eventName} - ${selectedHeat.heatName}`;
            document.getElementById('col-lane-title').innerText = (currentIsFieldEvent || isLongDist) ? "次序" : "線道";
            document.getElementById('input-section').classList.remove('hidden');

            const tbody = document.getElementById('student-table-body');
            tbody.innerHTML = '';

            selectedHeat.data.forEach((stu) => {
                const tr = document.createElement('tr');
                
                if (stu.isEmpty) {
                    // 顯示空線道，與紙本對齊
                    tr.className = "border-b empty-lane";
                    tr.innerHTML = `
                        <td class="px-4 py-2 text-center font-bold text-lg">${stu.assignedLane}</td>
                        <td class="px-4 py-2 text-center" colspan="3">-- 空線道 --</td>
                        <td class="px-4 py-2 text-center"><select disabled class="bg-gray-100 border rounded px-2 py-1 text-sm"><option>--</option></select></td>
                        <td class="px-4 py-2"><input disabled type="text" class="w-full bg-gray-100 border rounded px-2 py-1"></td>
                        <td class="px-4 py-2"><input disabled type="text" class="w-16 bg-gray-100 border rounded px-2 py-1"></td>
                        <td class="px-4 py-2"><input disabled type="text" class="w-full bg-gray-100 border rounded px-2 py-1"></td>
                    `;
                } else {
                    const name = stu.nameZh || stu.nameEn || '';
                    const bib = stu.bibNumber || '';
                    const cls = stu.classCode ? `${stu.classCode}(${stu.classNo || ''})` : '';

                    tr.className = "border-b hover:bg-blue-50 transition";
                    tr.innerHTML = `
                        <td class="px-4 py-2 text-center font-bold text-lg">${stu.assignedLane}</td>
                        <td class="px-4 py-2 font-bold">${bib}</td>
                        <td class="px-4 py-2">${name}</td>
                        <td class="px-4 py-2">${cls}</td>
                        <td class="px-4 py-2 text-center">
                            <select class="status-select border rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="handleStatusChange(this)">
                                <option value="NORMAL">正常</option>
                                <option value="ABS">ABS (缺席)</option>
                                <option value="DNF">DNF (未完成)</option>
                                <option value="DQ">DQ (取消資格)</option>
                            </select>
                        </td>
                        <td class="px-4 py-2 text-center">
                            <input type="text" maxlength="6" placeholder="${currentIsFieldEvent ? '例: 1234' : '例: 021651'}" 
                                class="result-input w-full text-center border border-gray-300 rounded px-2 py-1 text-lg font-mono input-focus"
                                onblur="formatResult(this)">
                        </td>
                        <td class="px-4 py-2 text-center">
                            <input type="number" min="1" max="8" class="rank-input w-16 text-center border border-gray-300 rounded px-2 py-1 text-lg font-bold input-focus">
                        </td>
                        <td class="px-4 py-2">
                            <input type="text" class="remark-input w-full border border-gray-300 rounded px-2 py-1 text-sm input-focus" placeholder="備註...">
                        </td>
                    `;
                }
                tbody.appendChild(tr);
            });

            if(selectedHeat.heatValue !== 'final') {
                document.getElementById('btn-generate-final').classList.remove('hidden');
            } else {
                document.getElementById('btn-generate-final').classList.add('hidden');
            }
        };

        window.handleStatusChange = function(selectElem) {
            const tr = selectElem.closest('tr');
            const resultInput = tr.querySelector('.result-input');
            const rankInput = tr.querySelector('.rank-input');
            const remarkInput = tr.querySelector('.remark-input');
            const status = selectElem.value;

            tr.classList.remove('status-abs', 'status-dnf', 'status-dq');

            if (status !== 'NORMAL') {
                resultInput.value = ''; resultInput.disabled = true; resultInput.classList.add('bg-gray-200');
                rankInput.value = ''; rankInput.disabled = true; rankInput.classList.add('bg-gray-200');
                remarkInput.value = status; 
                if (status === 'ABS') tr.classList.add('status-abs');
                if (status === 'DNF') tr.classList.add('status-dnf');
                if (status === 'DQ') tr.classList.add('status-dq');
            } else {
                resultInput.disabled = false; resultInput.classList.remove('bg-gray-200');
                rankInput.disabled = false; rankInput.classList.remove('bg-gray-200');
                remarkInput.value = '';
            }
        };

        window.formatResult = function(inputElem) {
            let val = inputElem.value.replace(/[^0-9]/g, ''); 
            if (!val) return;
            if (currentIsFieldEvent) {
                val = val.padEnd(4, '0').substring(0, 4);
                inputElem.value = `${val.substring(0,2)}.${val.substring(2,4)}m`;
            } else {
                val = val.padEnd(6, '0').substring(0, 6);
                inputElem.value = `${val.substring(0,2)}m ${val.substring(2,4)}.${val.substring(4,6)}s`;
            }
        };

        window.verifyAndSave = async function() {
            alert("成績核對完成，準備寫入資料庫！");
        };

        window.generateFinalists = function() {
            alert("系統將會讀取所有初賽組別的成績，自動排序並挑選進入決賽。");
        };

    </script>
</body>
</html>
