<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獻主會聖母院書院 - 比賽紀錄表生成系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        
        /* A4 紙張預覽樣式 */
        .a4-container {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto 20px auto;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 15mm;
            position: relative;
        }
        
        /* 表格樣式 */
        .sheet-table { width: 100%; border-collapse: collapse; font-size: 11pt; margin-top: 15px; }
        .sheet-table th, .sheet-table td { 
            border: 1px solid #000; 
            padding: 6px 2px; 
            text-align: center; 
            color: #000;
        }
        .sheet-table th { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; font-weight: bold; font-size: 10pt; }
        
        /* 可編輯區域的提示效果 */
        .editable-field {
            transition: background-color 0.2s;
            outline: none;
            border-bottom: 1px dashed #ccc;
            min-width: 50px;
            display: inline-block;
        }
        .editable-field:hover, .sheet-table td[contenteditable="true"]:hover { background-color: #eef2ff; cursor: text; }
        .editable-field:focus, .sheet-table td[contenteditable="true"]:focus { background-color: #fffacd; border-bottom: 1px solid #3b82f6; }

        /* 列印與 PDF 匯出設定 */
        @media print, .pdf-mode {
            body { background-color: white; }
            .no-print { display: none !important; }
            .a4-container { 
                box-shadow: none; 
                margin: 0; 
                padding: 10mm; 
                width: 100%;
                page-break-after: always;
            }
            .a4-container:last-child { page-break-after: auto; }
            .editable-field { border-bottom: none; }
        }
    </style>
</head>
<body>

    <!-- 頂部導覽列 (不列印) -->
    <nav class="bg-blue-800 text-white shadow-lg no-print sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-xl font-bold flex items-center">
                <i class="fas fa-file-signature mr-2"></i>
                <span>獻主會聖母院書院 - 比賽文件生成系統</span>
            </div>
            <div class="flex gap-3">
                <button onclick="exportPDF()" id="export-btn" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-bold transition shadow flex items-center hidden">
                    <i class="fas fa-file-pdf mr-2"></i> 匯出 A4 PDF
                </button>
            </div>
        </div>
    </nav>

    <!-- 控制面板 (不列印) -->
    <div class="max-w-7xl mx-auto px-4 py-6 no-print">
        <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-800">
            <h2 class="text-lg font-bold mb-4 text-gray-800"><i class="fas fa-cogs mr-2"></i>生成設定</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">1. 選擇比賽項目 (從賽程表)</label>
                    <select id="event-select" class="w-full border border-gray-300 rounded px-3 py-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">載入資料中...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">2. 比賽階段</label>
                    <select id="stage-select" class="w-full border border-gray-300 rounded px-3 py-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="初賽">初賽 / 直接決賽</option>
                        <option value="決賽">決賽 (需手動填寫名單)</option>
                    </select>
                </div>
                <div>
                    <button onclick="generateSheets()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition flex items-center justify-center">
                        <i class="fas fa-magic mr-2"></i> 產生文件
                    </button>
                </div>
            </div>
            
            <div class="mt-4 text-sm text-gray-500 bg-blue-50 p-3 rounded border border-blue-100">
                <i class="fas fa-info-circle text-blue-600 mr-1"></i> 
                <strong>提示：</strong> 系統已與賽程表連動，比賽編號將自動帶入文件中。徑賽若人數不足 8 人，仍會印出完整的 1-8 線道供裁判記錄。田賽已加入初賽及決賽的 6 次試跳/擲紀錄欄位。
            </div>
        </div>
    </div>

    <!-- PDF 內容預覽區 -->
    <div id="pdf-wrapper" class="w-full pb-20">
        <div id="preview-container" class="text-center text-gray-400 mt-10 no-print">
            <i class="fas fa-file-alt text-6xl mb-4 opacity-50"></i>
            <p>請在上方設定並點擊「產生文件」</p>
        </div>
        <!-- 產生的 A4 頁面會放在這裡 -->
        <div id="pages-container"></div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6N110dVd8_T9tygXEApjTPsQC5HsF0IQ",
            authDomain: "athletic-meet-85936.firebaseapp.com",
            projectId: "athletic-meet-85936"
        };

        let app, db;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            
            window.db = db;
            window.getDocs = getDocs;
            window.collection = collection;
            
            console.log("✅ Firebase 連線成功");
            fetchAllData(); 
        } catch (error) {
            console.error("❌ Firebase 初始化失敗：", error);
            document.getElementById('event-select').innerHTML = '<option value="">資料庫連線失敗</option>';
        }
    </script>

    <script>
        let globalStudentsData = [];
        let eventMap = new Map();
        let scheduleData = [];

        // 判斷是否為田賽
        function isFieldEvent(eventName) {
            const fieldKeywords = ['跳高', '跳遠', '鐵餅', '標槍', '鉛球', '壘球'];
            return fieldKeywords.some(keyword => eventName.includes(keyword));
        }

        // 從 Firebase 讀取學生報名與賽程表資料
        async function fetchAllData() {
            if (!window.db || !window.getDocs || !window.collection) return;
            
            try {
                // 1. 讀取學生報名資料
                const studentSnap = await window.getDocs(window.collection(window.db, "students"));
                globalStudentsData = [];
                eventMap.clear();

                studentSnap.forEach((doc) => {
                    const student = doc.data();
                    globalStudentsData.push(student);
                    
                    if (student.registeredEvents && Array.isArray(student.registeredEvents)) {
                        student.registeredEvents.forEach(ev => {
                            if (!eventMap.has(ev)) eventMap.set(ev, []);
                            eventMap.get(ev).push(student);
                        });
                    }
                });

                // 2. 讀取賽程表資料 (schedule)
                try {
                    const scheduleSnap = await window.getDocs(window.collection(window.db, "schedule"));
                    scheduleData = [];
                    scheduleSnap.forEach((doc) => {
                        scheduleData.push({ id: doc.id, ...doc.data() });
                    });
                } catch (e) {
                    console.warn("未能讀取 schedule 資料庫，將使用備用模式。");
                }

                populateDropdown();

            } catch (error) {
                console.error("讀取資料失敗:", error);
                document.getElementById('event-select').innerHTML = '<option value="">讀取資料失敗</option>';
            }
        }

        // 填充下拉選單
        function populateDropdown() {
            const select = document.getElementById('event-select');
            select.innerHTML = '<option value="">-- 請選擇比賽項目 --</option>';
            
            let hasSchedule = false;

            if (scheduleData && scheduleData.length > 0) {
                hasSchedule = true;
                
                // 依照項目編號排序
                scheduleData.sort((a, b) => {
                    const numA = parseInt(a['項目'] || a.itemNo || a.id) || 0;
                    const numB = parseInt(b['項目'] || b.itemNo || b.id) || 0;
                    return numA - numB;
                });

                scheduleData.forEach(item => {
                    // 支援多種可能的資料庫欄位命名
                    const itemNo = item['項目'] || item.itemNo || item.id || '';
                    const time = item['時間'] || item.time || '';
                    const group = item['女子組'] || item['男子組'] || item.girlsGroup || item.boysGroup || '';
                    const event = item['徑項'] || item['田項'] || item.trackEvent || item.fieldEvent || '';
                    const stage = (item['初賽'] || item.heats) ? '初賽' : '決賽';
                    
                    const fullEventName = `${group} ${event}`.trim();
                    
                    if (fullEventName) {
                        select.innerHTML += `<option value="${fullEventName}" data-itemno="${itemNo}" data-stage="${stage}" data-time="${time}">
                            【${itemNo}】 ${time} - ${fullEventName} (${stage})
                        </option>`;
                    }
                });
            }
            
            // 如果沒有賽程表資料，或者要補齊未排入賽程的項目
            if (!hasSchedule) {
                const sortedEvents = Array.from(eventMap.keys()).sort();
                if (sortedEvents.length === 0) {
                    select.innerHTML = '<option value="">資料庫中目前沒有報名資料</option>';
                    return;
                }
                sortedEvents.forEach(ev => {
                    const count = eventMap.get(ev).length;
                    select.innerHTML += `<option value="${ev}" data-itemno="" data-stage="初賽">${ev} (共 ${count} 人)</option>`;
                });
            }
        }

        // 監聽選單變更，自動帶入階段
        document.getElementById('event-select').addEventListener('change', function() {
            const option = this.options[this.selectedIndex];
            if (!option.value) return;
            
            const stage = option.getAttribute('data-stage');
            if (stage) {
                document.getElementById('stage-select').value = stage;
            }
        });

        // 生成文件核心邏輯
        function generateSheets() {
            const selectElement = document.getElementById('event-select');
            const selectedOption = selectElement.options[selectElement.selectedIndex];
            
            const eventName = selectedOption.value;
            const eventNo = selectedOption.getAttribute('data-itemno') || ''; // 從選項自動獲取編號
            const stage = document.getElementById('stage-select').value;
            const eventTime = selectedOption.getAttribute('data-time') || '__:__';
            
            if (!eventName) {
                alert("請先選擇比賽項目！");
                return;
            }

            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('export-btn').classList.remove('hidden');
            const container = document.getElementById('pages-container');
            container.innerHTML = ''; 

            let students = eventMap.get(eventName) || [];
            
            // 排序學生：按班別 -> 班號
            students.sort((a, b) => {
                if (a.classCode === b.classCode) return (a.classNo || 0) - (b.classNo || 0);
                return (a.classCode || '').localeCompare(b.classCode || '');
            });

            const isField = isFieldEvent(eventName);
            let heats = []; 

            // 判斷是否為直接決賽 (徑賽且人數 <= 8)
            let isDirectFinal = stage === "決賽" && students.length > 0 && students.length <= 8;

            // 處理徑賽分組邏輯 (強制產生 8 條線道)
            if (!isField && students.length > 0 && (stage !== "決賽" || isDirectFinal)) {
                const numHeats = Math.ceil(students.length / 8); 
                const baseSize = Math.floor(students.length / numHeats); 
                let remainder = students.length % numHeats; 

                let studentIndex = 0;
                for (let i = 0; i < numHeats; i++) {
                    let heatSize = baseSize + (remainder > 0 ? 1 : 0);
                    remainder--;

                    let heatStudents = students.slice(studentIndex, studentIndex + heatSize);
                    studentIndex += heatSize;

                    // 徑賽線道分配次序
                    const laneOrder = [3, 4, 5, 6, 2, 7, 1, 8];
                    let assignedLanes = laneOrder.slice(0, heatSize).sort((a, b) => a - b);

                    // 建立完整的 8 條線道陣列
                    let heatData = [];
                    for (let lane = 1; lane <= 8; lane++) {
                        heatData.push({ assignedLane: lane, isEmpty: true });
                    }

                    // 將學生填入對應的線道
                    heatStudents.forEach((stu, idx) => {
                        const laneToAssign = assignedLanes[idx];
                        const laneIndex = heatData.findIndex(d => d.assignedLane === laneToAssign);
                        if (laneIndex !== -1) {
                            heatData[laneIndex] = { ...stu, assignedLane: laneToAssign, isEmpty: false };
                        }
                    });

                    heats.push({
                        heatName: numHeats > 1 ? `第 ${i + 1} 組 (Heat ${i + 1})` : '',
                        data: heatData
                    });
                }
            } else if (!isField && stage === "決賽" && !isDirectFinal) {
                // 決賽且非直接決賽 (需手寫名單)，產生 8 條空線道
                let heatData = [];
                for (let lane = 1; lane <= 8; lane++) {
                    heatData.push({ assignedLane: lane, isEmpty: true });
                }
                heats.push({ heatName: '', data: heatData });
            } else {
                // 田賽直接一組 (不分線道)
                heats.push({ heatName: '', data: students });
            }
            
            // 一式四份的部門名稱
            const copies = [
                { role: "召集處", subtitle: "檢錄及點名用" },
                { role: isField ? "測量處" : "計時處", subtitle: "紀錄成績用" },
                { role: isField ? "裁判長" : "終點裁判", subtitle: "核對及名次判定" },
                { role: "最終紀錄", subtitle: "大會紀錄組存檔" }
            ];

            // 針對每一組 (Heat) 產生 4 份文件
            heats.forEach((heat) => {
                copies.forEach((copy, index) => {
                    const pageHTML = buildA4Page(eventNo, eventName, stage, heat.data, isField, copy.role, copy.subtitle, index + 1, heat.heatName, eventTime);
                    container.innerHTML += pageHTML;
                });
            });
        }

        // 構建單張 A4 頁面的 HTML
        function buildA4Page(eventNo, eventName, stage, heatData, isField, role, subtitle, copyNum, heatName, eventTime) {
            let category = "";
            let item = eventName;
            const parts = eventName.split(' ');
            if(parts.length > 1) {
                category = parts[0];
                item = parts.slice(1).join(' ');
            }

            const eventNoDisplay = eventNo ? `【${eventNo}】 ` : '';
            const heatDisplay = heatName ? ` - ${heatName}` : '';

            let tableHeaders = "";
            if (isField) {
                tableHeaders = `
                    <tr>
                        <th width="4%">次序</th>
                        <th width="6%">號碼布</th>
                        <th width="16%">姓名</th>
                        <th width="6%">班別</th>
                        <th width="7%">初 1</th>
                        <th width="7%">初 2</th>
                        <th width="7%">初 3</th>
                        <th width="6%">決賽<br>次序</th>
                        <th width="7%">決 1</th>
                        <th width="7%">決 2</th>
                        <th width="7%">決 3</th>
                        <th width="12%">最佳成績</th>
                        <th width="8%">名次</th>
                    </tr>
                `;
            } else {
                tableHeaders = `
                    <tr>
                        <th width="6%">線道</th>
                        <th width="10%">號碼布</th>
                        <th width="25%">姓名</th>
                        <th width="8%">班別</th>
                        <th width="18%">成績 / 時間</th>
                        <th width="8%">名次</th>
                        <th width="25%">備註 (犯規/缺席)</th>
                    </tr>
                `;
            }

            let tableRows = "";
            if (isField && heatData.length === 0 && stage === "決賽") {
                // 田賽決賽空表 (留 8 行)
                for(let i=1; i<=8; i++) {
                    tableRows += generateStudentRow({ isEmpty: true }, i, isField);
                }
            } else {
                heatData.forEach((stu, idx) => {
                    // 田賽傳入 idx + 1 作為次序，徑賽則使用 stu.assignedLane
                    tableRows += generateStudentRow(stu, idx + 1, isField);
                });
            }

            return `
                <div class="a4-container">
                    <!-- 頁首 -->
                    <div class="text-center mb-6">
                        <h1 class="text-2xl font-bold tracking-widest mb-1">獻主會聖母院書院</h1>
                        <h2 class="text-xl font-bold tracking-wider mb-4">二零二五年度陸運會</h2>
                        
                        <div class="flex justify-between items-end border-b-2 border-black pb-2">
                            <div class="text-left">
                                <div class="text-lg font-bold">項目：${eventNoDisplay}${category} <span class="text-xl mx-2">${item}</span> ${stage}${heatDisplay}</div>
                                <div class="text-sm mt-2">
                                    比賽日期：<span class="editable-field" contenteditable="true">_____月_____日</span> &nbsp;&nbsp;
                                    時間：<span class="editable-field" contenteditable="true">${eventTime}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-xl font-bold border-2 border-black px-4 py-1 inline-block bg-gray-100">
                                    ${role} <span class="text-sm font-normal block">${subtitle}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 紀錄資訊 -->
                    <div class="flex justify-between text-sm mb-3 font-medium">
                        <div>
                            大會紀錄：<span class="editable-field" contenteditable="true">__________________</span> 
                            (<span class="editable-field" contenteditable="true">年份/保持者</span>)
                        </div>
                        <div>文件編號：${copyNum}/4</div>
                    </div>

                    <!-- 名單表格 -->
                    <table class="sheet-table">
                        <thead>
                            ${tableHeaders}
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>

                    <!-- 簽名區 -->
                    <div class="absolute bottom-10 left-10 right-10 flex justify-between text-sm pt-4 border-t border-gray-400 mt-10">
                        <div>召集員簽署：____________________</div>
                        <div>裁判長簽署：____________________</div>
                        <div>紀錄員簽署：____________________</div>
                    </div>
                </div>
            `;
        }

        function generateStudentRow(student, index, isField) {
            if (isField) {
                if (student.isEmpty) {
                    return `
                        <tr>
                            <td contenteditable="true">${index}</td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true" class="bg-gray-100"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true" class="bg-gray-50"></td>
                            <td contenteditable="true"></td>
                        </tr>
                    `;
                } else {
                    const name = student.nameZh || student.nameEn || '';
                    const bib = student.bibNumber || '';
                    const cls = student.classCode ? `${student.classCode}${student.classNo ? '('+student.classNo+')' : ''}` : '';
                    
                    return `
                        <tr>
                            <td contenteditable="true">${index}</td>
                            <td class="font-bold">${bib}</td>
                            <td class="text-left px-1 text-sm">${name}</td>
                            <td class="text-sm">${cls}</td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true" class="bg-gray-100"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true" class="bg-gray-50"></td>
                            <td contenteditable="true"></td>
                        </tr>
                    `;
                }
            } else {
                // 徑賽 (一定會有 8 條線道傳入)
                if (student.isEmpty) {
                    return `
                        <tr>
                            <td contenteditable="true" class="font-bold">${student.assignedLane}</td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                        </tr>
                    `;
                } else {
                    const name = student.nameZh || student.nameEn || '';
                    const bib = student.bibNumber || '';
                    const cls = student.classCode ? `${student.classCode}${student.classNo ? '('+student.classNo+')' : ''}` : '';
                    
                    return `
                        <tr>
                            <td contenteditable="true" class="font-bold">${student.assignedLane}</td>
                            <td class="font-bold">${bib}</td>
                            <td class="text-left px-2">${name}</td>
                            <td>${cls}</td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true" class="text-left text-xs text-gray-500"></td>
                        </tr>
                    `;
                }
            }
        }

        // 匯出 PDF 功能
        function exportPDF() {
            const element = document.getElementById('pdf-wrapper');
            const selectElement = document.getElementById('event-select');
            const selectedOption = selectElement.options[selectElement.selectedIndex];
            
            const eventName = selectedOption.value;
            const eventNo = selectedOption.getAttribute('data-itemno') || '';
            
            const fileNamePrefix = eventNo ? `【${eventNo}】_` : '';
            
            element.classList.add('pdf-mode');

            const opt = {
                margin:       0,
                filename:     `${fileNamePrefix}陸運會_${eventName}_紀錄表.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, windowWidth: 1024 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            const btn = document.getElementById('export-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 處理中...';
            btn.disabled = true;

            html2pdf().set(opt).from(element).save().then(() => {
                element.classList.remove('pdf-mode');
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
