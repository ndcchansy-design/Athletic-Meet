<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比賽文件生成系統 - 獻主會聖母院書院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        .a4-container { width: 210mm; min-height: 297mm; margin: 0 auto 20px auto; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 15mm; box-sizing: border-box; display: flex; flex-direction: column; }
        .sheet-table { width: 100%; border-collapse: collapse; font-size: 11pt; margin-top: 15px; }
        .sheet-table th, .sheet-table td { border: 1px solid #000; padding: 6px 2px; text-align: center; color: #000; }
        .sheet-table th { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; font-weight: bold; font-size: 10pt; }
        .editable-field { transition: background-color 0.2s; outline: none; border-bottom: 1px dashed #ccc; min-width: 50px; display: inline-block; }
        @media print, .pdf-mode {
            body { background-color: white; }
            .no-print { display: none !important; }
            .a4-container { box-shadow: none; margin: 0; padding: 10mm; width: 100%; page-break-after: always; }
            .a4-container:last-child { page-break-after: auto; }
            .editable-field { border-bottom: none; }
        }
    </style>
</head>
<body>

    <nav class="bg-blue-800 text-white shadow-lg no-print sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-xl font-bold flex items-center"><i class="fas fa-file-signature mr-2"></i><span>比賽文件生成系統</span></div>
            <button onclick="exportPDF()" id="export-btn" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-bold transition shadow flex items-center hidden"><i class="fas fa-file-pdf mr-2"></i> 匯出 A4 PDF</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6 no-print">
        <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-800">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">1. 選擇比賽項目</label>
                    <select id="event-select" class="w-full border border-gray-300 rounded px-3 py-2 bg-gray-50 focus:ring-2 focus:ring-blue-500">
                        <option value="">載入資料中...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">2. 比賽階段</label>
                    <select id="stage-select" class="w-full border border-gray-300 rounded px-3 py-2 bg-gray-50 focus:ring-2 focus:ring-blue-500">
                        <option value="初賽">初賽 / 直接決賽</option>
                        <option value="決賽">決賽 (自動抓取決賽名單)</option>
                    </select>
                </div>
                <div>
                    <button onclick="generateSheets()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition flex items-center justify-center">
                        <i class="fas fa-magic mr-2"></i> 產生文件
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="pdf-wrapper" class="w-full pb-20">
        <div id="preview-container" class="text-center text-gray-400 mt-10 no-print"><i class="fas fa-file-alt text-6xl mb-4 opacity-50"></i><p>請在上方設定並點擊「產生文件」</p></div>
        <div id="pages-container"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB6N110dVd8_T9tygXEApjTPsQC5HsF0IQ", authDomain: "athletic-meet-85936.firebaseapp.com", projectId: "athletic-meet-85936" };
        let app, db;
        try {
            app = initializeApp(firebaseConfig); db = getFirestore(app);
            window.db = db; window.getDocs = getDocs; window.collection = collection; window.doc = doc; window.getDoc = getDoc;
            fetchAllData(); 
        } catch (error) { console.error(error); }
    </script>

    <script>
        let globalStudentsData = [];
        let eventMap = new Map();
        let scheduleData = [];
        let globalSchoolYear = ""; 

        const getChineseYear = (yearStr) => {
            let y = yearStr || new Date().getFullYear().toString();
            const targetYear = y.match(/^\d{4}/) ? y.match(/^\d{4}/)[0] : new Date().getFullYear().toString();
            const zhMap = {'0':'零', '1':'一', '2':'二', '3':'三', '4':'四', '5':'五', '6':'六', '7':'七', '8':'八', '9':'九'};
            return targetYear.split('').map(d => zhMap[d]).join('');
        };

        const normalizeString = (str) => str ? str.replace(/\s+/g, '').toUpperCase().replace('擲壘球', '壘球').replace('擲標槍', '標槍').replace('擲鐵餅', '鐵餅').replace('推鉛球', '鉛球').replace('推銘球', '鉛球') : '';
        const isFieldEvent = (eventName) => ['跳高', '跳遠', '鐵餅', '標槍', '鉛球', '壘球'].some(k => eventName.includes(k));
        const isLongDistance = (eventName) => eventName.toUpperCase().includes('800M') || eventName.toUpperCase().includes('1500M');

        async function fetchAllData() {
            const studentSnap = await window.getDocs(window.collection(window.db, "students"));
            studentSnap.forEach((doc) => {
                const student = doc.data();
                globalStudentsData.push(student);
                if (!globalSchoolYear && student.schoolYear) globalSchoolYear = student.schoolYear;
                if (student.registeredEvents) {
                    student.registeredEvents.forEach(ev => {
                        const normalizedEv = normalizeString(ev);
                        if (!eventMap.has(normalizedEv)) eventMap.set(normalizedEv, []);
                        eventMap.get(normalizedEv).push(student);
                    });
                }
            });

            try {
                const scheduleSnap = await window.getDocs(window.collection(window.db, "schedule"));
                scheduleSnap.forEach(doc => scheduleData.push({ id: doc.id, ...doc.data() }));
            } catch (e) {}
            populateDropdown();
        }

        function populateDropdown() {
            const select = document.getElementById('event-select');
            select.innerHTML = '<option value="">-- 請選擇比賽項目 --</option>';
            
            scheduleData.sort((a, b) => (parseInt(a['項目'] || a.itemNo) || 0) - (parseInt(b['項目'] || b.itemNo) || 0));

            scheduleData.forEach(item => {
                const itemNo = item['項目'] || item.itemNo || '';
                const time = item['時間'] || item.time || '';
                const group = item['女子組'] || item['男子組'] || '';
                const event = item['徑項'] || item['田項'] || '';
                const stage = (item['初賽'] || item.heats) ? '初賽' : '決賽';
                
                const fullEventName = `${group} ${event}`.trim();
                if (fullEventName) {
                    const matchKey = normalizeString(`${group}${event}`);
                    select.innerHTML += `<option value="${fullEventName}" data-matchkey="${matchKey}" data-itemno="${itemNo}" data-stage="${stage}" data-time="${time}">【${itemNo || '未編號'}】 ${time} - ${fullEventName} (${stage})</option>`;
                }
            });

            select.addEventListener('change', function() {
                const stage = this.options[this.selectedIndex].getAttribute('data-stage');
                if (stage) document.getElementById('stage-select').value = stage;
            });
        }

        window.generateSheets = async function() {
            const selectElement = document.getElementById('event-select');
            const selectedOption = selectElement.options[selectElement.selectedIndex];
            if (!selectedOption.value) return alert("請先選擇比賽項目！");

            const eventName = selectedOption.value;
            const matchKey = selectedOption.getAttribute('data-matchkey');
            const eventNo = selectedOption.getAttribute('data-itemno') || ''; 
            const stage = document.getElementById('stage-select').value;
            const eventTime = selectedOption.getAttribute('data-time') || '__:__';

            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('export-btn').classList.remove('hidden');
            const container = document.getElementById('pages-container');
            container.innerHTML = ''; 

            let students = [...(eventMap.get(matchKey) || [])].sort((a, b) => (a.bibNumber || '').localeCompare(b.bibNumber || ''));
            const isField = isFieldEvent(eventName);
            const isLongDist = isLongDistance(eventName);
            let heats = []; 

            // ==========================================
            // 新功能 3：若是決賽，自動抓取決賽名單
            // ==========================================
            if (stage === "決賽" && !isField && !isLongDist) {
                try {
                    const docSnap = await window.getDoc(window.doc(window.db, "results", `${matchKey}_final`));
                    let heatData = Array.from({length: 8}, (_, i) => ({ assignedLane: i + 1, isEmpty: true }));
                    
                    if (docSnap.exists()) {
                        const finalRecords = docSnap.data().records;
                        finalRecords.forEach(rec => {
                            const stu = globalStudentsData.find(s => s.bibNumber === rec.bib);
                            if(stu) {
                                const laneIndex = heatData.findIndex(d => d.assignedLane === parseInt(rec.lane));
                                if(laneIndex !== -1) heatData[laneIndex] = { ...stu, assignedLane: parseInt(rec.lane), isEmpty: false, qualifyingTime: rec.qualifyingTime };
                            }
                        });
                    }
                    heats.push({ heatName: '決賽', data: heatData });
                } catch(e) {
                    console.error("無法讀取決賽名單", e);
                }
            } else if (isField) {
                heats.push({ heatName: '', data: students });
            } else if (isLongDist) {
                let numHeats = (students.length >= 17 && stage !== "決賽") ? Math.ceil(students.length / 15) : 1;
                const baseSize = Math.floor(students.length / numHeats);
                let remainder = students.length % numHeats;
                let studentIndex = 0;
                for (let i = 0; i < numHeats; i++) {
                    let heatSize = baseSize + (remainder > 0 ? 1 : 0); remainder--;
                    let heatStudents = students.slice(studentIndex, studentIndex + heatSize); studentIndex += heatSize;
                    heats.push({ heatName: numHeats > 1 ? `第 ${i + 1} 組` : '', data: heatStudents.map((stu, idx) => ({ ...stu, assignedLane: idx + 1, isEmpty: false })) });
                }
            } else {
                let isDirectFinal = stage === "決賽" && students.length > 0 && students.length <= 8;
                if (students.length > 0 && (stage !== "決賽" || isDirectFinal)) {
                    const numHeats = Math.ceil(students.length / 8); 
                    const baseSize = Math.floor(students.length / numHeats); 
                    let remainder = students.length % numHeats; 
                    let studentIndex = 0;
                    for (let i = 0; i < numHeats; i++) {
                        let heatSize = baseSize + (remainder > 0 ? 1 : 0); remainder--;
                        let heatStudents = students.slice(studentIndex, studentIndex + heatSize); studentIndex += heatSize;
                        const laneOrder = [3, 4, 5, 6, 2, 7, 1, 8];
                        let assignedLanes = laneOrder.slice(0, heatSize).sort((a, b) => a - b);
                        let heatData = Array.from({length: 8}, (_, i) => ({ assignedLane: i + 1, isEmpty: true }));
                        heatStudents.forEach((stu, idx) => {
                            const laneIndex = heatData.findIndex(d => d.assignedLane === assignedLanes[idx]);
                            if (laneIndex !== -1) heatData[laneIndex] = { ...stu, assignedLane: assignedLanes[idx], isEmpty: false };
                        });
                        heats.push({ heatName: numHeats > 1 ? `第 ${i + 1} 組` : '', data: heatData });
                    }
                }
            }
            
            const copies = [
                { role: "召集處", subtitle: "檢錄及點名用" },
                { role: isField ? "測量處" : "計時處", subtitle: "紀錄成績用" },
                { role: isField ? "裁判長" : "終點裁判", subtitle: "核對及名次判定" },
                { role: "最終紀錄", subtitle: "大會紀錄組存檔" }
            ];

            heats.forEach((heat) => {
                copies.forEach((copy, index) => {
                    const totalPages = Math.ceil(heat.data.length / 20) || 1;
                    for (let p = 0; p < totalPages; p++) {
                        const chunk = heat.data.slice(p * 20, (p + 1) * 20);
                        container.innerHTML += buildA4Page(eventNo, eventName, stage, chunk, isField, isLongDist, copy.role, copy.subtitle, index + 1, heat.heatName, eventTime, p + 1, totalPages, p * 20);
                    }
                });
            });
        }

        function buildA4Page(eventNo, eventName, stage, heatData, isField, isLongDist, role, subtitle, copyNum, heatName, eventTime, currentPage, totalPages, startIndex) {
            let category = "", item = eventName;
            const parts = eventName.split(' ');
            if(parts.length > 1) { category = parts[0]; item = parts.slice(1).join(' '); }

            const eventNoDisplay = eventNo ? `【${eventNo}】 ` : `【未編號】 `;
            const zhYear = getChineseYear(globalSchoolYear);

            let tableHeaders = isField ? 
                `<tr><th width="4%">次序</th><th width="6%">號碼布</th><th width="16%">姓名</th><th width="6%">班別</th><th width="7%">初 1</th><th width="7%">初 2</th><th width="7%">初 3</th><th width="6%">決賽次序</th><th width="7%">決 1</th><th width="7%">決 2</th><th width="7%">決 3</th><th width="12%">最佳成績</th><th width="8%">名次</th></tr>` : 
                `<tr><th width="6%">${isLongDist ? "次序" : "線道"}</th><th width="10%">號碼布</th><th width="25%">姓名</th><th width="8%">班別</th><th width="18%">成績 / 時間</th><th width="8%">名次</th><th width="25%">備註 (晉級成績)</th></tr>`;

            let tableRows = "";
            heatData.forEach((stu, idx) => {
                if (stu.isEmpty) {
                    tableRows += isField ? `<tr><td contenteditable="true">${startIndex + idx + 1}</td><td colspan="12"></td></tr>` : `<tr><td class="font-bold">${stu.assignedLane}</td><td colspan="6"></td></tr>`;
                } else {
                    const name = stu.nameZh || stu.nameEn || '';
                    const cls = stu.classCode ? `${stu.classCode}(${stu.classNo||''})` : '';
                    const qualTime = stu.qualifyingTime ? `晉級成績: ${stu.qualifyingTime}` : '';
                    
                    if(isField) {
                        tableRows += `<tr><td>${startIndex + idx + 1}</td><td class="font-bold">${stu.bibNumber}</td><td class="text-left px-1 text-sm">${name}</td><td>${cls}</td><td colspan="3"></td><td class="bg-gray-100"></td><td colspan="3"></td><td class="bg-gray-50"></td><td></td></tr>`;
                    } else {
                        tableRows += `<tr><td class="font-bold">${stu.assignedLane}</td><td class="font-bold">${stu.bibNumber}</td><td class="text-left px-2">${name}</td><td>${cls}</td><td></td><td></td><td class="text-xs text-gray-500 text-left px-2">${qualTime}</td></tr>`;
                    }
                }
            });

            return `
                <div class="a4-container">
                    <div class="flex-1">
                        <div class="text-center mb-6">
                            <h1 class="text-2xl font-bold tracking-widest mb-1">獻主會聖母院書院</h1>
                            <h2 class="text-xl font-bold tracking-wider mb-4">${zhYear}年度陸運會</h2>
                            <div class="flex justify-between items-end border-b-2 border-black pb-2">
                                <div class="text-left">
                                    <div class="text-lg font-bold">項目：${eventNoDisplay}${category} <span class="text-xl mx-2">${item}</span> ${stage}${heatName ? ` - ${heatName}` : ''}</div>
                                    <div class="text-sm mt-2">比賽日期：_____月_____日 &nbsp;&nbsp; 時間：${eventTime}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xl font-bold border-2 border-black px-4 py-1 inline-block bg-gray-100">${role} <span class="text-sm font-normal block">${subtitle}</span></div>
                                </div>
                            </div>
                        </div>
                        <table class="sheet-table"><thead>${tableHeaders}</thead><tbody>${tableRows}</tbody></table>
                    </div>
                </div>
            `;
        }

        window.exportPDF = function() {
            const element = document.getElementById('pdf-wrapper');
            element.classList.add('pdf-mode');
            const opt = { margin: 0, filename: `陸運會_紀錄表.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            
            const btn = document.getElementById('export-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 處理中...';
            
            html2pdf().set(opt).from(element).save().then(() => {
                element.classList.remove('pdf-mode');
                btn.innerHTML = '<i class="fas fa-file-pdf mr-2"></i> 匯出 A4 PDF';
            });
        }
    </script>
</body>
</html>
