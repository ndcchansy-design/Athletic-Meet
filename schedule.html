        tr:hover .row-actions { opacity: 1; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;

            body { background-color: white; }

            .pdf-container { width: 100% !important; max-width: none !important; padding: 0 !important; margin: 0 !important; box-shadow: none !important; }

            th, td { border: 1px solid #000; padding: 4px 6px; text-align: center; color: #000; height: 28px; }
            th { background-color: #fff !important; font-weight: bold; -webkit-print-color-adjust: exact; }
            .divider-row td { background-color: #fff !important; font-weight: bold; -webkit-print-color-adjust: exact; border-left: none; border-right: none; }
            .page-break { page-break-before: always; }
            .cancelled-event { display: none !important; }
            table { border-left: none; border-right: none; }
            tr td:first-child, tr th:first-child { border-left: none; }
            tr td:last-child, tr th:last-child { border-right: none; }
        }

            const isMockMode = document.getElementById('mock-mode-toggle').checked;

            try {
                eventCountMap.clear();
                if (!isMockMode) {
                    const studentSnap = await getDocs(collection(db, "students"));
                    studentSnap.forEach((doc) => {
                        const student = doc.data();
                        if (student.registeredEvents && Array.isArray(student.registeredEvents)) {
                            student.registeredEvents.forEach(ev => {
                                const normalizedEv = normalizeString(ev);
                                eventCountMap.set(normalizedEv, (eventCountMap.get(normalizedEv) || 0) + 1);
                            });
                        }
                    });
                }
            } catch (error) {
                console.error("讀取失敗:", error);
            }

            appData = [];
            let completedStraightFinals = new Set(); 

            for (let row of defaultData) {
                if (row.type === 'divider') {
                    appData.push(row);
                    continue;
                }

                let eventName = row.track || row.field;
                let category = row.girls || row.boys;
                
                let format1 = normalizeString(`${eventName}${category}`);
                let format2 = normalizeString(`${category}${eventName}`);
                
                let count = 0;
                if (isMockMode) {
                    count = mockCounts[format1] || mockCounts[format2] || 0;
                } else {
                    count = eventCountMap.get(format1) || eventCountMap.get(format2) || 0;
                }
                
                row.participantCount = count;
                row.isValidEvent = false;
                row.heat = '';
                row.final = '';

                // 核心修改：判斷是否為接力項目
                let isRelay = eventName.includes('接力');

                if (isRelay) {
                    // 接力項目不經系統報名，永遠保留並直接進入決賽
                    row.isValidEvent = true;
                    row.final = 'F';
                } else if (count <= 1) {
                    // 非接力項目，人數少於或等於 1 人則取消
                    row.isValidEvent = false;
                } else {
                    if (row.field) {
                        row.isValidEvent = true;
                        row.final = count;
                    } else if (row.track) {
                        let isLongDistance = eventName.includes('800m') || eventName.includes('1500m');

                        if (isLongDistance) {
                            row.isValidEvent = true;
                            row.final = count;
                        } else if (count >= 2 && count <= 8) {
                            if (completedStraightFinals.has(format1)) {
                                row.isValidEvent = false;
                            } else {
                                row.isValidEvent = true;
                                row.final = count;
                                completedStraightFinals.add(format1);
                            }
                        } else if (count >= 9) {
                            row.isValidEvent = true;
                            if (row.day === 1) {
                                let heatCount = Math.ceil(count / 8);
                                row.heat = 'H' + heatCount;
                            } else {
                                row.final = 'F';
                            }
                        }
                    }
                }
                appData.push(row);
            }

            window.renderTables();
            document.getElementById('loading-overlay').style.display = 'none';
        };

        window.renderTables = function() {
            let itemCounter = 1; 
            const tbody1 = document.getElementById('tbody-day-1');
            const tbody2 = document.getElementById('tbody-day-2');
            tbody1.innerHTML = '';
            tbody2.innerHTML = '';

            appData.forEach((row, index) => {
                const tr = document.createElement('tr');
                
                if (row.type === 'divider') {
                    tr.className = "border-b border-gray-300 bg-gray-50 divider-row";
                    tr.innerHTML = `
                        <td class="py-2 px-1 text-center"></td>
                        <td class="py-2 px-1 text-center editable-cell" contenteditable="true" onblur="window.updateData(${index}, 'time', this.innerText)">${row.time}</td>
                        <td class="py-2 px-1 text-center editable-cell" contenteditable="true" colspan="6" onblur="window.updateData(${index}, 'text', this.innerText)">${row.text}</td>
                        <td class="py-2 px-1 text-center no-print">
                            <div class="row-actions flex justify-center gap-2">
                                <button onclick="window.addRow(${index}, ${row.day})" class="text-green-600"><i class="fas fa-plus"></i></button>
                                <button onclick="window.deleteRow(${index})" class="text-red-500"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    `;
                } else {
                    // 如果是接力項目且沒有 Firebase 數據，顯示 "接力" 而非 "0人"
                    let cancelText = row.participantCount;
                    let displayItemNumber = row.isValidEvent ? itemCounter++ : `<span class="text-gray-300 text-xs">取消 (${cancelText}人)</span>`;
                    
                    tr.className = row.isValidEvent 
                        ? "border-b border-gray-200 hover:bg-gray-50 group" 
                        : "border-b border-gray-200 bg-gray-100 opacity-40 group cancelled-event no-print";

                    tr.innerHTML = `
                        <td class="py-2 px-1 text-center">${displayItemNumber}</td>
                        <td class="py-2 px-1 text-center editable-cell" contenteditable="true" onblur="window.updateData(${index}, 'time', this.innerText)">${row.time}</td>
                        <td class="py-2 px-1 text-left editable-cell" contenteditable="true" onblur="window.updateData(${index}, 'track', this.innerText)">${row.track}</td>
                        <td class="py-2 px-1 text-left editable-cell" contenteditable="true" onblur="window.updateData(${index}, 'field', this.innerText)">${row.field}</td>
                        <td class="py-2 px-1 text-left editable-cell" contenteditable="true" onblur="window.updateData(${index}, 'girls', this.innerText)">${row.girls}</td>
                        <td class="py-2 px-1 text-left editable-cell" contenteditable="true" onblur="window.updateData(${index}, 'boys', this.innerText)">${row.boys}</td>
                        <td class="py-2 px-1 text-center editable-cell" contenteditable="true" onblur="window.updateData(${index}, 'heat', this.innerText)">${row.heat}</td>
                        <td class="py-2 px-1 text-center editable-cell" contenteditable="true" onblur="window.updateData(${index}, 'final', this.innerText)">${row.final}</td>
                        <td class="py-2 px-1 text-center no-print">
                            <div class="row-actions flex justify-center gap-2">
                                <button onclick="window.addRow(${index}, ${row.day})" class="text-green-600"><i class="fas fa-plus"></i></button>
                                <button onclick="window.deleteRow(${index})" class="text-red-500"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    `;
                }

                if (row.day === 1) tbody1.appendChild(tr);
                else tbody2.appendChild(tr);
            });
        };

        window.updateData = function(index, field, value) { appData[index][field] = value.trim(); };
        window.addRow = function(index, day) {
            appData.splice(index + 1, 0, { day: day, type: 'event', time: '', track: '', field: '', girls: '', boys: '', heat: '', final: '', isValidEvent: true });
            window.renderTables();
        };
        window.deleteRow = function(index) {
            if(confirm('確定刪除？編號將自動重整。')) { appData.splice(index, 1); window.renderTables(); }
        };

        window.switchTab = function(tab) {
            const btn1 = document.getElementById('tab-btn-1'), btn2 = document.getElementById('tab-btn-2'), btnAll = document.getElementById('tab-btn-all');
            const day1 = document.getElementById('day-1-container'), day2 = document.getElementById('day-2-container');

            [btn1, btn2, btnAll].forEach(btn => btn.classList.remove('text-blue-800', 'border-blue-800'));
            [btn1, btn2, btnAll].forEach(btn => btn.classList.add('text-gray-500', 'border-transparent'));

            if (tab === 1) { btn1.classList.add('text-blue-800', 'border-blue-800'); day1.classList.remove('hidden'); day2.classList.add('hidden'); }
            else if (tab === 2) { btn2.classList.add('text-blue-800', 'border-blue-800'); day1.classList.add('hidden'); day2.classList.remove('hidden'); }
            else { btnAll.classList.add('text-blue-800', 'border-blue-800'); day1.classList.remove('hidden'); day2.classList.remove('hidden'); }
        };

        window.exportPDF = function() {
            document.getElementById('day-1-container').classList.remove('hidden');
            document.getElementById('day-2-container').classList.remove('hidden');
            
            const element = document.getElementById('pdf-content');
            element.classList.add('pdf-mode');

            const opt = {
                margin:       [15, 10, 15, 10],
                filename:     '陸運會賽程表_2025.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 產生中...';
            btn.disabled = true;

            html2pdf().set(opt).from(element).save().then(() => {
                element.classList.remove('pdf-mode');
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                window.switchTab(1);
            });
        };

        window.addEventListener('DOMContentLoaded', window.initSystem);
    </script>
</body>
</html>
