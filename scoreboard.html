<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陸運會即時計分看板 - 獻主會聖母院書院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #0f172a; color: white; overflow: hidden; }
        .view-container { transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out; position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 1.5rem; box-sizing: border-box; }
        .fade-out { opacity: 0; transform: scale(0.98); pointer-events: none; z-index: 0; }
        .fade-in { opacity: 1; transform: scale(1); z-index: 10; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- 頂部導航列 -->
    <header class="bg-slate-800 border-b border-slate-700 p-4 shadow-lg flex justify-between items-center z-50 shrink-0">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 p-2 rounded-lg shadow-lg">
                <i class="fas fa-chart-line text-2xl text-white"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-wider text-blue-400">獻主會聖母院書院</h1>
                <p class="text-sm text-slate-400 font-medium tracking-widest">陸運會即時計分看板</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- 測試模式切換按鈕 -->
            <button id="btn-toggle-mock" onclick="toggleMockMode()" class="px-3 py-1.5 rounded text-sm font-bold bg-purple-600 hover:bg-purple-500 text-white transition-colors flex items-center gap-2 shadow-lg">
                <i class="fas fa-vial"></i> <span id="mock-btn-text">使用測試數據中</span>
            </button>

            <div id="status-indicator" class="text-sm font-bold px-3 py-1.5 rounded bg-yellow-600 text-white flex items-center shadow-lg">
                <i class="fas fa-sync fa-spin mr-2"></i> 載入資料中...
            </div>
            
            <!-- 手動切換視圖按鈕 -->
            <div class="flex bg-slate-900 rounded-full p-1 border border-slate-700 shadow-inner">
                <button id="tab-class" onclick="switchTabs('CLASS')" class="px-6 py-1.5 rounded-full text-sm font-bold bg-blue-600 text-white transition-colors cursor-pointer">各班總分</button>
                <button id="tab-champ" onclick="switchTabs('CHAMP')" class="px-6 py-1.5 rounded-full text-sm font-bold text-slate-400 hover:text-white transition-colors cursor-pointer">最佳運動員</button>
            </div>
            
            <div class="flex items-center gap-2 text-xl font-mono bg-slate-900 px-4 py-1.5 rounded-lg border border-slate-700 shadow-inner text-blue-300">
                <i class="far fa-clock"></i>
                <span id="clock">00:00:00</span>
            </div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-1 relative overflow-hidden">
        
        <!-- 視圖 1: 各班總分 -->
        <div id="view-class" class="view-container fade-in flex flex-col max-w-5xl mx-auto">
            <div class="flex flex-col items-center justify-center gap-2 mb-4 shrink-0">
                <div class="flex items-center gap-4">
                    <i class="fas fa-trophy text-3xl text-yellow-400"></i>
                    <h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-200 tracking-wider">
                        各班總分排行榜
                    </h2>
                    <i class="fas fa-trophy text-3xl text-yellow-400"></i>
                </div>
                
                <!-- 級別篩選器 -->
                <div class="flex gap-2 mt-2 bg-slate-800 p-1.5 rounded-lg border border-slate-700">
                    <button onclick="setFormFilter('ALL')" id="filter-ALL" class="filter-btn px-4 py-1 rounded-md text-sm font-bold bg-blue-500 text-white transition-colors">全校排名</button>
                    <button onclick="setFormFilter('1')" id="filter-1" class="filter-btn px-4 py-1 rounded-md text-sm font-bold text-slate-400 hover:bg-slate-700 transition-colors">中一</button>
                    <button onclick="setFormFilter('2')" id="filter-2" class="filter-btn px-4 py-1 rounded-md text-sm font-bold text-slate-400 hover:bg-slate-700 transition-colors">中二</button>
                    <button onclick="setFormFilter('3')" id="filter-3" class="filter-btn px-4 py-1 rounded-md text-sm font-bold text-slate-400 hover:bg-slate-700 transition-colors">中三</button>
                    <button onclick="setFormFilter('4')" id="filter-4" class="filter-btn px-4 py-1 rounded-md text-sm font-bold text-slate-400 hover:bg-slate-700 transition-colors">中四</button>
                    <button onclick="setFormFilter('5')" id="filter-5" class="filter-btn px-4 py-1 rounded-md text-sm font-bold text-slate-400 hover:bg-slate-700 transition-colors">中五</button>
                    <button onclick="setFormFilter('6')" id="filter-6" class="filter-btn px-4 py-1 rounded-md text-sm font-bold text-slate-400 hover:bg-slate-700 transition-colors">中六</button>
                </div>
            </div>

            <div id="class-list-container" class="flex-1 overflow-y-auto flex flex-col gap-3 pt-2 pb-10">
                <!-- 動態生成 -->
            </div>
        </div>

        <!-- 視圖 2: 最佳運動員 -->
        <div id="view-champ" class="view-container fade-out flex flex-col">
            <div class="flex items-center justify-center gap-4 mb-6 shrink-0">
                <i class="fas fa-star text-4xl text-yellow-400"></i>
                <h2 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-200 tracking-wider">
                    個人最佳運動員 (頭三名)
                </h2>
                <i class="fas fa-star text-4xl text-yellow-400"></i>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 flex-1 overflow-y-auto pb-10 px-4 max-w-7xl mx-auto w-full">
                <!-- 男子組 -->
                <div class="space-y-6">
                    <h3 class="text-2xl font-bold text-blue-400 border-b-2 border-blue-800 pb-2 flex items-center gap-2">
                        <i class="fas fa-male text-3xl"></i> 男子組 (Boys)
                    </h3>
                    <div id="champ-boys-a"></div>
                    <div id="champ-boys-b"></div>
                    <div id="champ-boys-c"></div>
                </div>

                <!-- 女子組 -->
                <div class="space-y-6">
                    <h3 class="text-2xl font-bold text-pink-400 border-b-2 border-pink-800 pb-2 flex items-center gap-2">
                        <i class="fas fa-female text-3xl"></i> 女子組 (Girls)
                    </h3>
                    <div id="champ-girls-a"></div>
                    <div id="champ-girls-b"></div>
                    <div id="champ-girls-c"></div>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-slate-950 border-t border-slate-800 p-2 text-center text-slate-500 text-xs shrink-0 z-50">
        計分規則：班級總分 = (個人總得分 ÷ 班別人數) + 接力賽雙倍得分。個人計分：第1至8名得9至1分，參與分1分，缺席扣1分，工作人員加2分。同分以金牌數多者勝出。
    </footer>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6N110dVd8_T9tygXEApjTPsQC5HsF0IQ",
            authDomain: "athletic-meet-85936.firebaseapp.com",
            projectId: "athletic-meet-85936"
        };

        let db;
        let studentsData = [];
        let resultsData = [];
        let globalClassScores = []; // 儲存計算後的班級成績以便篩選
        
        // 狀態控制
        window.useMockData = true; // 預設開啟測試模式
        window.currentFormFilter = 'ALL';

        // 計分設定
        const RANK_POINTS = { 1: 9, 2: 7, 3: 6, 4: 5, 5: 4, 6: 3, 7: 2, 8: 1 };
        const PART_POINT = 1;
        const ABSENT_PENALTY = -1;
        const HELPER_POINT = 2;

        // --- 測試數據 (Sample Data) ---
        const mockStudents = [
            { bibNumber: "1A01", nameZh: "陳大文", classCode: "1A", gender: "M", dob: "2012-01-01" }, // 甲組, 冠軍
            { bibNumber: "1A02", nameZh: "李小明", classCode: "1A", gender: "M", dob: "2012-01-01", helperRole: "計時員" }, // 工作人員
            { bibNumber: "1A03", nameZh: "張三", classCode: "1A", gender: "M", dob: "2012-01-01" }, // DNS
            { bibNumber: "1B01", nameZh: "王美麗", classCode: "1B", gender: "F", dob: "2012-01-01" }, // 亞軍
            { bibNumber: "1B02", nameZh: "何小花", classCode: "1B", gender: "F", dob: "2012-01-01" },
            { bibNumber: "2A01", nameZh: "劉德華", classCode: "2A", gender: "M", dob: "2011-01-01" }, // 乙組
            { bibNumber: "2A02", nameZh: "郭富城", classCode: "2A", gender: "M", dob: "2011-01-01" },
            { bibNumber: "6A01", nameZh: "張學友", classCode: "6A", gender: "M", dob: "2007-01-01" }  // 甲組
        ];

        const mockResults = [
            {
                id: "event_1_final", stage: "決賽", event: "男子100米 決賽",
                records: [
                    { bib: "1A01", status: "正常", rank: "1" }, // 9分 + 1參與
                    { bib: "2A01", status: "正常", rank: "2" }, // 7分 + 1參與
                    { bib: "1A03", status: "DNS" }              // -1分
                ]
            },
            {
                id: "event_2_final", stage: "決賽", event: "女子100米 決賽",
                records: [
                    { bib: "1B01", status: "正常", rank: "2" }  // 7分 + 1參與
                ]
            },
            {
                id: "event_3_final", stage: "決賽", event: "男子4x100米接力 決賽",
                records: [
                    { bib: "1A", status: "正常", rank: "1" }    // 接力 9分 * 2 = 18分
                ]
            }
        ];
        // -----------------------------

        // 初始化
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            loadData();
        } catch (error) {
            console.error("Firebase 初始化失敗", error);
        }

        // 時鐘更新
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-HK', { hour12: false });
        }, 1000);

        // 手動切換視圖 (取代原本的 setInterval)
        window.switchTabs = function(view) {
            const viewClass = document.getElementById('view-class');
            const viewChamp = document.getElementById('view-champ');
            const tabClass = document.getElementById('tab-class');
            const tabChamp = document.getElementById('tab-champ');

            if (view === 'CHAMP') {
                viewClass.classList.replace('fade-in', 'fade-out');
                viewChamp.classList.replace('fade-out', 'fade-in');
                tabClass.className = 'px-6 py-1.5 rounded-full text-sm font-bold text-slate-400 hover:text-white transition-colors cursor-pointer';
                tabChamp.className = 'px-6 py-1.5 rounded-full text-sm font-bold bg-yellow-600 text-white transition-colors cursor-pointer shadow-md';
            } else {
                viewChamp.classList.replace('fade-in', 'fade-out');
                viewClass.classList.replace('fade-out', 'fade-in');
                tabChamp.className = 'px-6 py-1.5 rounded-full text-sm font-bold text-slate-400 hover:text-white transition-colors cursor-pointer';
                tabClass.className = 'px-6 py-1.5 rounded-full text-sm font-bold bg-blue-600 text-white transition-colors cursor-pointer shadow-md';
            }
        };

        // 切換測試/真實數據
        window.toggleMockMode = function() {
            window.useMockData = !window.useMockData;
            const btn = document.getElementById('btn-toggle-mock');
            const btnText = document.getElementById('mock-btn-text');
            
            if (window.useMockData) {
                btn.className = "px-3 py-1.5 rounded text-sm font-bold bg-purple-600 hover:bg-purple-500 text-white transition-colors flex items-center gap-2 shadow-lg";
                btnText.innerText = "使用測試數據中";
            } else {
                btn.className = "px-3 py-1.5 rounded text-sm font-bold bg-slate-600 hover:bg-slate-500 text-white transition-colors flex items-center gap-2 shadow-lg";
                btnText.innerText = "切換為真實數據";
            }
            loadData();
        };

        // 級別篩選器
        window.setFormFilter = function(form) {
            window.currentFormFilter = form;
            
            // 更新按鈕樣式
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = 'filter-btn px-4 py-1 rounded-md text-sm font-bold text-slate-400 hover:bg-slate-700 transition-colors';
            });
            const activeBtn = document.getElementById(`filter-${form}`);
            activeBtn.className = 'filter-btn px-4 py-1 rounded-md text-sm font-bold bg-blue-500 text-white transition-colors shadow-md';
            
            // 重新渲染班級列表
            renderClassScores(globalClassScores);
        };

        async function loadData() {
            document.getElementById('status-indicator').innerHTML = '<i class="fas fa-sync fa-spin mr-2"></i> 載入資料中...';
            document.getElementById('status-indicator').className = 'text-sm font-bold px-3 py-1.5 rounded bg-yellow-600 text-white flex items-center shadow-lg';

            if (window.useMockData) {
                studentsData = [...mockStudents];
                resultsData = [...mockResults];
                calculateAndRender();
                document.getElementById('status-indicator').innerHTML = '<i class="fas fa-check-circle mr-2"></i> 測試模式就緒';
                document.getElementById('status-indicator').className = 'text-sm font-bold px-3 py-1.5 rounded bg-purple-600 text-white flex items-center shadow-lg';
            } else {
                try {
                    const studentSnap = await getDocs(collection(db, "students"));
                    studentsData = [];
                    studentSnap.forEach(doc => studentsData.push(doc.data()));

                    onSnapshot(collection(db, "results"), (snapshot) => {
                        if(window.useMockData) return; // 避免切換回測試模式時被覆蓋
                        resultsData = [];
                        snapshot.forEach(doc => resultsData.push({ id: doc.id, ...doc.data() }));
                        
                        document.getElementById('status-indicator').innerHTML = '<i class="fas fa-check-circle mr-2"></i> 即時更新中';
                        document.getElementById('status-indicator').className = 'text-sm font-bold px-3 py-1.5 rounded bg-green-600 text-white flex items-center shadow-lg';
                        
                        calculateAndRender();
                    });
                } catch (error) {
                    document.getElementById('status-indicator').innerHTML = '<i class="fas fa-times-circle mr-2"></i> 連線失敗';
                    document.getElementById('status-indicator').className = 'text-sm font-bold px-3 py-1.5 rounded bg-red-600 text-white flex items-center shadow-lg';
                }
            }
        }

        function getStudentGrade(student) {
            let year = 0;
            if (student.dob) {
                const match = student.dob.match(/\b(19|20)\d{2}\b/);
                if (match) year = parseInt(match[0]);
            }
            if (year > 0) {
                if (year >= 2012) return '丙組';
                if (year >= 2010) return '乙組';
                return '甲組';
            }
            if (student.classCode) {
                const form = parseInt(student.classCode.charAt(0));
                if (!isNaN(form)) {
                    if (form <= 2) return '丙組';
                    if (form <= 4) return '乙組';
                    return '甲組';
                }
            }
            return '甲組';
        }

        function calculateAndRender() {
            let classStats = {}; 
            let athleteStats = {};

            studentsData.forEach(s => {
                if (!s.classCode) return;
                
                if (!classStats[s.classCode]) {
                    classStats[s.classCode] = { size: 0, indTotal: 0, relayTotal: 0 };
                }
                classStats[s.classCode].size++;

                let grade = getStudentGrade(s);
                let gender = (s.gender === 'M' || s.gender === '男') ? '男子' : '女子';
                let category = `${gender}${grade}`;

                athleteStats[s.bibNumber] = {
                    bib: s.bibNumber, name: s.nameZh || s.nameEn, classCode: s.classCode,
                    category: category, score: 0, golds: 0, details: [],
                    isHelper: !!s.helperRole, participations: new Set(), dnsCount: 0
                };
            });

            resultsData.forEach(resultDoc => {
                if (!resultDoc.records) return;
                const isFinal = resultDoc.stage === '決賽' || resultDoc.id.includes('_final_results');
                const isRelay = resultDoc.event && resultDoc.event.includes('接力');

                resultDoc.records.forEach(rec => {
                    if (rec.status === 'DNS') {
                        if (athleteStats[rec.bib]) athleteStats[rec.bib].dnsCount++;
                    } else if (rec.status === '正常') {
                        if (athleteStats[rec.bib]) {
                            let baseEvent = resultDoc.event.replace('初賽', '').replace('決賽', '').trim();
                            athleteStats[rec.bib].participations.add(baseEvent);
                        }

                        if (isFinal && rec.rank) {
                            let rank = parseInt(rec.rank);
                            let pts = RANK_POINTS[rank] || 0;

                            if (isRelay) {
                                let clsMatch = rec.bib.match(/^([1-6][A-Z])/i);
                                let cls = clsMatch ? clsMatch[1].toUpperCase() : null;
                                if (!cls && athleteStats[rec.bib]) cls = athleteStats[rec.bib].classCode;

                                if (cls && classStats[cls]) {
                                    classStats[cls].relayTotal += (pts * 2);
                                }
                            } else {
                                if (athleteStats[rec.bib]) {
                                    athleteStats[rec.bib].score += pts;
                                    if (rank === 1) athleteStats[rec.bib].golds++;
                                    let rankStr = rank === 1 ? '🥇' : (rank === 2 ? '🥈' : (rank === 3 ? '🥉' : `第${rank}`));
                                    athleteStats[rec.bib].details.push(`${resultDoc.event.split(' ').pop()} ${rankStr}`);
                                }
                            }
                        }
                    }
                });
            });

            Object.values(athleteStats).forEach(ath => {
                let indPts = ath.score;
                let partPts = ath.participations.size * PART_POINT;
                let helperPts = ath.isHelper ? HELPER_POINT : 0;
                let penaltyPts = ath.dnsCount > 0 ? (ath.dnsCount * ABSENT_PENALTY) : 0;

                let totalIndPts = indPts + partPts + helperPts + penaltyPts;

                if (classStats[ath.classCode]) {
                    classStats[ath.classCode].indTotal += totalIndPts;
                }
            });

            globalClassScores = Object.keys(classStats).map(cls => {
                let stats = classStats[cls];
                if (stats.size === 0) return null;
                let avgInd = stats.indTotal / stats.size;
                let total = avgInd + stats.relayTotal;
                return { className: cls, avgInd: avgInd, relay: stats.relayTotal, total: total };
            }).filter(c => c !== null).sort((a, b) => b.total - a.total);

            let sortedAthletes = Object.values(athleteStats)
                .filter(a => a.score > 0) 
                .sort((a, b) => b.score !== a.score ? b.score - a.score : b.golds - a.golds);

            let champions = { '男子甲組': [], '男子乙組': [], '男子丙組': [], '女子甲組': [], '女子乙組': [], '女子丙組': [] };
            sortedAthletes.forEach(a => {
                if (champions[a.category] && champions[a.category].length < 3) {
                    champions[a.category].push(a);
                }
            });

            renderClassScores(globalClassScores);
            renderChampions(champions);
        }

        function renderClassScores(scores) {
            const container = document.getElementById('class-list-container');
            container.innerHTML = '';
            
            // 套用級別篩選
            let filteredScores = scores;
            if (window.currentFormFilter !== 'ALL') {
                filteredScores = scores.filter(s => s.className.startsWith(window.currentFormFilter));
            }

            if (filteredScores.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-500 py-10">此級別尚無成績資料</div>`;
                return;
            }

            filteredScores.forEach((cls, index) => {
                let medalHtml = `<span class="text-2xl font-bold text-slate-500">${index + 1}</span>`;
                let totalColor = 'text-white';

                if (index === 0) {
                    medalHtml = `<i class="fas fa-medal text-4xl text-yellow-400 drop-shadow-md"></i>`;
                    totalColor = 'text-yellow-400';
                } else if (index === 1) {
                    medalHtml = `<i class="fas fa-medal text-4xl text-slate-300"></i>`;
                    totalColor = 'text-slate-200';
                } else if (index === 2) {
                    medalHtml = `<i class="fas fa-medal text-4xl text-amber-600"></i>`;
                    totalColor = 'text-amber-500';
                }

                // 移除 Bar Chart，改用更清晰的數據塊佈局
                container.innerHTML += `
                    <div class="flex items-center glass-panel rounded-xl p-4 hover:bg-slate-800 transition-colors border-l-4 ${index === 0 ? 'border-yellow-400' : 'border-transparent'}">
                        <div class="w-16 flex justify-center">${medalHtml}</div>
                        
                        <div class="w-28 flex justify-center">
                            <span class="text-3xl font-black text-white bg-slate-700 px-4 py-1.5 rounded-lg border border-slate-600 shadow-inner">
                                ${cls.className}
                            </span>
                        </div>

                        <div class="flex-1 px-8 flex items-center justify-center gap-8">
                            <div class="text-center bg-slate-800/50 px-6 py-2 rounded-lg">
                                <div class="text-2xl font-mono text-blue-300">${cls.avgInd.toFixed(2)}</div>
                                <div class="text-xs text-slate-400 mt-1">個人均分</div>
                            </div>
                            <div class="text-slate-600 text-2xl font-black">+</div>
                            <div class="text-center bg-slate-800/50 px-6 py-2 rounded-lg">
                                <div class="text-2xl font-mono text-green-400">${cls.relay}</div>
                                <div class="text-xs text-slate-400 mt-1">接力得分</div>
                            </div>
                        </div>

                        <div class="w-40 text-right bg-slate-900/80 px-4 py-2 rounded-xl border border-slate-700">
                            <div class="text-4xl font-black font-mono ${totalColor}">${cls.total.toFixed(2)}</div>
                            <div class="text-xs text-slate-500 mt-1">班級總得分</div>
                        </div>
                    </div>
                `;
            });
        }

        function renderChampions(champions) {
            const renderCategory = (id, title, athletes, colorClass) => {
                const container = document.getElementById(id);
                let html = `<div class="glass-panel rounded-xl p-4 border-t-4 border-${colorClass}-500">
                    <h4 class="text-xl font-bold mb-4 text-${colorClass}-300">${title}</h4>
                    <div class="space-y-3">`;
                
                if (athletes.length === 0) {
                    html += `<div class="text-center text-slate-500 text-sm py-4">尚無成績</div>`;
                } else {
                    athletes.forEach((ath, idx) => {
                        let medalColor = idx === 0 ? 'text-yellow-400 drop-shadow-md' : (idx === 1 ? 'text-slate-300' : 'text-amber-600');
                        html += `
                            <div class="flex items-center bg-slate-800/60 rounded-lg p-3 relative overflow-hidden">
                                <div class="absolute -left-2 -top-4 text-6xl font-black text-slate-700/30 italic pointer-events-none">${idx + 1}</div>
                                <div class="w-10 flex justify-center z-10"><i class="fas fa-medal text-2xl ${medalColor}"></i></div>
                                <div class="flex-1 z-10 pl-2">
                                    <div class="flex items-baseline gap-2">
                                        <span class="text-lg font-bold text-white">${ath.name}</span>
                                        <span class="text-xs font-medium text-slate-400 bg-slate-700 px-2 py-0.5 rounded">${ath.classCode}</span>
                                    </div>
                                    <div class="text-xs text-slate-400 mt-1 truncate">${ath.details.join(', ') || '無項目資料'}</div>
                                </div>
                                <div class="text-right z-10">
                                    <div class="text-2xl font-black text-yellow-400 font-mono">${ath.score}</div>
                                    <div class="text-xs text-slate-500">名次積分</div>
                                </div>
                            </div>
                        `;
                    });
                }
                html += `</div></div>`;
                container.innerHTML = html;
            };

            renderCategory('champ-boys-a', '男子甲組', champions['男子甲組'], 'blue');
            renderCategory('champ-boys-b', '男子乙組', champions['男子乙組'], 'blue');
            renderCategory('champ-boys-c', '男子丙組', champions['男子丙組'], 'blue');
            
            renderCategory('champ-girls-a', '女子甲組', champions['女子甲組'], 'pink');
            renderCategory('champ-girls-b', '女子乙組', champions['女子乙組'], 'pink');
            renderCategory('champ-girls-c', '女子丙組', champions['女子丙組'], 'pink');
        }
    </script>
</body>
</html>
